    <style>

        .vertical-line{height:4096px;width:1px;top:-2048px;}
        .resize-controls{margin-top:4px;padding:4px;background:#f0f8ff;border-radius:4px;display:none;}
        .resize-controls.show{display:block;}

<script>
if(!Array.from){Array.from=function(arr){var result=[];for(var i=0;i<arr.length;i++)result.push(arr[i]);return result;};}
if(!String.prototype.startsWith){String.prototype.startsWith=function(str){return this.indexOf(str)===0;};}
if(typeof Object.assign!='function'){
    Object.assign=function(target){
        if(target==null)throw new TypeError('Cannot convert undefined or null to object');
        var to=Object(target);
        for(var index=1;index<arguments.length;index++){
            var next=arguments[index];
            if(next!=null){
                for(var key in next){
                    if(Object.prototype.hasOwnProperty.call(next,key))to[key]=next[key];
                }
            }
        }
        return to;
    };
}
if(!('classList'in HTMLElement.prototype)){
    Object.defineProperty(HTMLElement.prototype,'classList',{
        get:function(){
            var el=this;
            return{
                add:function(cls){el.className+=' '+cls;},
                remove:function(cls){el.className=el.className.replace(new RegExp('\\b'+cls+'\\b','g'),'');},
                contains:function(cls){return new RegExp('\\b'+cls+'\\b').test(el.className);},
                toggle:function(cls){this.contains(cls)?this.remove(cls):this.add(cls);}
            };
        }
    });
}
function addEvent(el,type,fn){
    if(el.addEventListener){el.addEventListener(type,fn,false);}
    else if(el.attachEvent){el.attachEvent('on'+type,fn);}
    else{el['on'+type]=fn;}
}
function removeEvent(el,type,fn){
    if(el.removeEventListener){el.removeEventListener(type,fn,false);}
    else if(el.detachEvent){el.detachEvent('on'+type,fn);}
}
function toggleCommonGuide(type){
    var contentEl=document.getElementById('commonGuideContent');
    var guideHeader=document.querySelectorAll('.guide-header');
    var guideText={
    guide:'1. 最初に画像を読み込み、暗号化時は分割ブロック数とパスワードを設定して「暗号化」をクリックすると暗号化が完了します。復号化時は正しい分割ブロック数とパスワードを入力して「復号化」をクリックすると復号化できます。<br>'+
          '2. 画像をクリックするとプレビュー表示が可能です。プレビュー画像は拡大縮小・ドラッグ操作に対応し、画像上の任意の点のピクセル座標を取得することもできます。<br>'+
          '3.「局部処理」機能を有効にすると、画像内の任意の矩形領域のみを暗号化・復号でき、従来の復元不可能な各種画像修正手法に代わります。左上と右下のピクセル座標を入力して処理領域の位置と形状を制御し、復号化時は暗号化時と同じ座標を入力して「確定」をクリックして領域を設定してください。<br>'+
          '4. 分割ブロック数は、画像の幅と高さのピクセル数で割り切れる値に設定することを推奨します。割り切れない部分は暗号化の対象外となります。分割ブロック数が多いほど暗号化強度は高くなりますが、処理時間が大幅に長くなる場合があります。<br>'+
          '5. 「領域を切り抜き」機能は、局部処理で選択した範囲を切り抜いた後に暗号化・復号を実行します。暗号情報が隠された画像から情報を抽出する際に利用できます。<br>'+
          '6. ネットワーク画像の読み込みに失敗した場合、サイトが盗難防止設定をしている可能性があります。画像をローカルにダウンロードし、「ローカル画像アップロード」機能で読み込んでください。<br>'+
          '7. 暗号化完了後、分割ブロック数、パスワード、局部処理時の座標は忘れないように暗号化後のファイル名に自動的に付加されます。注意：ファイル名またはパスワードが長すぎる、または特殊文字を含む場合はこの機能が無効になることがあります。<br>'+
          '8. 暗号化済み画像が拡大縮小や伸縮で破損して復号化できない場合、「サイズ調整」機能で元のサイズに戻すと、元の内容を最大限復号化できます。<br>'+
          '9. 本ツールをブックマークまたはお気に入りに登録すると、ブラウザからいつでもアクセスでき、より便利に利用できます。',
    about:'プロジェクトアドレス: <a href="https://github.com/7a617a/Image-Mosaic-Encryption-and-Decryption-Tool-">https://github.com/7a617a/Image-Mosaic-Encryption-and-Decryption-Tool-</a><br>バージョン:10.5'
};
    for(var i=0;i<guideHeader.length;i++){var txt=guideHeader[i].textContent;guideHeader[i].textContent=txt.replace(' ▼',' ▶');}
    if(activeGuideType===type){contentEl.style.display='none';activeGuideType='';return;}
    activeGuideType=type;
    contentEl.innerHTML=guideText[type];
    contentEl.style.display='block';
    var currentHeader=document.querySelector('.guide-header[onclick="toggleCommonGuide(\''+type+'\')"]');
    currentHeader.textContent=currentHeader.textContent.replace(' ▶',' ▼');
}

function hideOtherControls(imageId,excludeType){
    if(excludeType!=='resize')hideResizeControls(imageId);
    if(excludeType!=='local')hideLocalControls(imageId);
}
function showLocalControls(imageId){
    hideOtherControls(imageId,'local');
    var d=fileProcessData[imageId];
    if(!d)return;
    var controls=document.getElementById('localControls_'+imageId);
    var u1=document.getElementById('localu1_'+imageId);
    var v1=document.getElementById('localv1_'+imageId);
    var u2=document.getElementById('localu2_'+imageId);
    var v2=document.getElementById('localv2_'+imageId);
    var crop=document.getElementById('localCrop_'+imageId);
    if(!d.localCoordsLocked){
        u1.value=0;v1.value=0;
        u2.value=d.originalCanvas.width;v2.value=d.originalCanvas.height;
        crop.checked=false;
    }
    u1.disabled=v1.disabled=u2.disabled=v2.disabled=crop.disabled=d.localCoordsLocked;
    u1.className=v1.className=u2.className=v2.className=d.localCoordsLocked?'local-coords-locked':'';
    controls.classList.add('show');
    drawCardOverlay(imageId);
}
function hideLocalControls(imageId){
    var controls=document.getElementById('localControls_'+imageId);
    if(controls)controls.classList.remove('show');
}
function createCanvasPair(imageId){
    return{
        id:imageId,originalCanvas:document.createElement('canvas'),
        processedCanvas:document.createElement('canvas'),originalImageData:null,
        blockSize:{width:0,height:0},validSize:{width:0,height:0},
        isProcessed:false,isEncrypt:false,file:null,isFromUrl:false,
        cardElement:null,originalImageSrc:'',processedImageSrc:'',
        originalWidth:0,originalHeight:0,aspectRatio:0,
        localu1:0,localv1:0,localu2:0,localv2:0,
        localCrop:false,localProcessEnabled:false,localCoordsLocked:false
    };
}

    addEvent(document.getElementById('cancelLocal_'+imageId),'click',function(){cancelLocalProcess(imageId);});

function handleImageLoaded(img,imageId,fileData){
    fileData.originalCanvas.width=img.width;
    fileData.originalCanvas.height=img.height;

function processSingleImage(imageId,isDecrypt){
    var d=fileProcessData[imageId];
    if(!d||!d.originalImageData){showToast('画像が読み込まれていません','error');return false;}
    var bc=+blockCountInput.value;
    if(bc<1||isNaN(bc)||Math.floor(bc)<bc){showToast('ブロック数は正の整数である必要があります','error');return false;}
    var key=secretKeyInput.value.trim();
    if(!key){showToast('パスワードを入力してください','error');return false;}
    var useLocal=d.localProcessEnabled;
    var lu1=useLocal?d.localu1:0;
    var lv1=useLocal?d.localv1:0;
    var lu2=useLocal?d.localu2:d.originalImageData.width;
    var lv2=useLocal?d.localv2:d.originalImageData.height;
    var crop=useLocal?d.localCrop:false;
    var processWidth=lu2-lu1;
    var processHeight=lv2-lv1;
    if(bc>d.originalImageData.width||bc>d.originalImageData.height){showToast('ブロック数は画像の幅または高さを超えることはできません','error');return false;}
    if(processWidth<bc||processHeight<bc){showToast('ブロック数は領域の幅または高さを超えることはできません','error');return false;}
    var validProcessW=Math.floor(processWidth/bc)*bc;
    var validProcessH=Math.floor(processHeight/bc)*bc;
    var offsetX=lu1;var offsetY=lv1;
    d.validSize.width=validProcessW;d.validSize.height=validProcessH;
    d.blockSize.width=validProcessW/bc;d.blockSize.height=validProcessH/bc;
    var total=bc*bc;
    var seq=getShuffledIndexArray(total,key,isDecrypt);
    var ctxTemp=d.originalCanvas.getContext('2d');
    var outputCanvas=d.processedCanvas;
    var outputCtx=outputCanvas.getContext('2d');
    var outputWidth,outputHeight;
    if(crop&&useLocal){
        outputWidth=processWidth;outputHeight=processHeight;
    }else{
        outputWidth=d.originalImageData.width;outputHeight=d.originalImageData.height;
    }
    outputCanvas.width=outputWidth;outputCanvas.height=outputHeight;
    if(!crop||!useLocal){
        outputCtx.drawImage(d.originalCanvas,0,0);
    }else{
        outputCtx.drawImage(d.originalCanvas,offsetX,offsetY,processWidth,processHeight,0,0,processWidth,processHeight);
    }
    var newData=ctxTemp.createImageData(validProcessW,validProcessH);
    var localImageData=ctxTemp.getImageData(offsetX,offsetY,validProcessW,validProcessH);
    for(var i=0;i<total;i++){
        var tIdx=isDecrypt?i:seq[i];
        var type=getBlockTransformType(tIdx,key,total);
        var sRow=Math.floor(i/bc),sCol=i%bc;
        var tRow=Math.floor(seq[i]/bc),tCol=seq[i]%bc;
        copyAndTransformBlock(
            localImageData,newData,
            sCol*d.blockSize.width,sRow*d.blockSize.height,
            tCol*d.blockSize.width,tRow*d.blockSize.height,
            d.blockSize.width,d.blockSize.height,type
        );
    }
    crop&&useLocal?outputCtx.putImageData(newData,0,0):outputCtx.putImageData(newData,offsetX,offsetY);
    d.isProcessed=true;d.isEncrypt=!isDecrypt;d.blockCount=bc;d.secretKey=key;
    var pImg=document.getElementById('processedImage_'+imageId);
    pImg.src=outputCanvas.toDataURL('image/png');
    pImg.style.display='block';
    pImg.nextElementSibling.textContent=isDecrypt?(useLocal?'局部復号化済':'復号化済'):(useLocal?'局部暗号化済':'暗号化済');
    document.getElementById('singleDownloadBtn_'+imageId).disabled=false;
    return true;
}

function getShuffledIndexArray(count,key,isDecrypt){
    isDecrypt=isDecrypt||false;
    var seed=314159265;
    for(var i=0;i<key.length;i++){var c=key.charCodeAt(i);seed=((seed*7654321)^(c*(i+1)*1009))+count;seed=seed%2147483647;}
    function secureRandom(){seed^=seed<<13;seed^=seed>>>17;seed^=seed<<5;return(seed>>>0)/4294967296;}
    var indexArray=[];
    for(var i=0;i<count;i++)indexArray.push(i);
    var result=indexArray.slice();
    for(var i=result.length-1;i>0;i--){
        var j=Math.floor(secureRandom()*(i+1));
        var temp=result[i];
        result[i]=result[j];
        result[j]=temp;
    }
    if(isDecrypt){
        var reverseArray=new Array(count);
        for(var i=0;i<count;i++)reverseArray[result[i]]=i;
        return reverseArray;
    }
    return result;
}
function getBlockTransformType(blockIndex,key,totalBlocks){
    var hash=blockIndex;
    for(var i=0;i<key.length;i++){
        var c=key.charCodeAt(i);
        hash+=c;
        hash+=hash<<10;
        hash^=hash>>>6;
    }
    hash+=hash<<3;
    hash^=hash>>>11;
    hash+=hash<<15;
    return(hash>>>0)%4;
}
function transformBlockData(blockData,blockWidth,blockHeight,transformType,isDecrypt){
    var pixelCount=blockWidth*blockHeight*4;
    var newBlock;
    if(window.Uint8ClampedArray){
        newBlock=new Uint8ClampedArray(pixelCount);
    }else{
        newBlock=new Array(pixelCount);
        for(var i=0;i<pixelCount;i++){
            newBlock[i]=0;
        }
    }
    for(var y=0;y<blockHeight;y++){
        for(var x=0;x<blockWidth;x++){
            var nx=x,ny=y;
            switch(transformType){
                case 0:break;
                case 1:nx=blockWidth-1-x;break;
                case 2:ny=blockHeight-1-y;break;
                case 3:nx=blockWidth-1-x;ny=blockHeight-1-y;break;
            }
            var src=(ny*blockWidth+nx)*4;
            var dst=(y*blockWidth+x)*4;
            newBlock[dst]=blockData[src];
            newBlock[dst+1]=blockData[src+1];
            newBlock[dst+2]=blockData[src+2];
            newBlock[dst+3]=blockData[src+3];
        }
    }
    return newBlock;
}
function copyAndTransformBlock(srcData,destData,srcX,srcY,destX,destY,w,h,type,isDecrypt){
    var srcW=srcData.width;
    var destW=destData.width;
    var pixelCount=w*h*4;
    var block;
    if(window.Uint8ClampedArray){
        block=new Uint8ClampedArray(pixelCount);
    }else{
        block=new Array(pixelCount);
        for(var i=0;i<pixelCount;i++){
            block[i]=0;
        }
    }
    for(var y=0;y<h;y++){
        for(var x=0;x<w;x++){
            var sIdx=((srcY+y)*srcW+(srcX+x))*4;
            var dIdx=(y*w+x)*4;
            block[dIdx]=srcData.data[sIdx];
            block[dIdx+1]=srcData.data[sIdx+1];
            block[dIdx+2]=srcData.data[sIdx+2];
            block[dIdx+3]=srcData.data[sIdx+3];
        }
    }
    var transformed=transformBlockData(block,w,h,type,isDecrypt);
    for(var y=0;y<h;y++){
        for(var x=0;x<w;x++){
            var dIdx=((destY+y)*destW+(destX+x))*4;
            var bIdx=(y*w+x)*4;
            destData.data[dIdx]=transformed[bIdx];
            destData.data[dIdx+1]=transformed[bIdx+1];
            destData.data[dIdx+2]=transformed[bIdx+2];
            destData.data[dIdx+3]=transformed[bIdx+3];
        }
    }
}

        document.getElementById('originalImage_'+id).src=d.originalCanvas.toDataURL('image/png');
        updatePixelInfo(id,w,h);d.processedCanvas.width=w;d.processedCanvas.height=h;d.isProcessed=false;
        var p=document.getElementById('processedImage_'+id);p.src='';p.style.display='none';p.nextElementSibling.textContent='未処理';
        document.getElementById('singleDownloadBtn_'+id).disabled=true;hideResizeControls(id);showToast('サイズ調整に成功しました','success');
        drawCardOverlay(id);
    };
    img.onerror=function(){showToast('調整に失敗しました','error');};
}
function updatePixelInfo(id,w,h){document.getElementById('pixelInfo_'+id).textContent='ピクセルサイズ：'+w+' × '+h;}
function loadImageFromUrl(){
    var url=imageUrlInput.value.trim();urlErrorTip.style.display='none';
    if(!validateImageUrl(url)){urlErrorTip.textContent='URL形式が不正です！';urlErrorTip.style.display='block';return;}
    var id=imageIdCounter++;
    var data=createCanvasPair(id);
    data.isFromUrl=true;
    data.file={name:'ネットワーク画像_'+(id+1)};
    var showName=url.length>50?url.substring(0,50)+'...':url;
    createImageCard(id,data,'ネットワーク画像：'+showName);
    var img=new Image();
    try{img.crossOrigin='anonymous';}catch(e){}
    img.onload=function(){handleImageLoaded(img,id,data);imageUrlInput.value='';};
    img.onerror=function(){urlErrorTip.textContent='画像の読み込みに失敗しました！';urlErrorTip.style.display='block';removeImage(id);data.cardElement.parentNode.removeChild(data.cardElement);img=null;};
    img.src=url;
}
function handleFileSelect(e){
    var files=e.target.files;
    if(!files.length)return;
    Array.from(files).forEach(function(file){
        var reader=new FileReader();
        var id=imageIdCounter++;
        var data=createCanvasPair(id);
        data.file=file;
        createImageCard(id,data,'ファイル：'+file.name);
        reader.onload=function(e){
            var img=new Image();
            img.onload=function(){handleImageLoaded(img,id,data);};
            img.onerror=function(){showToast(file.name+'の読み込みに失敗しました','error');removeImage(id);data.cardElement.parentNode.removeChild(data.cardElement);img=null;};
            img.src=e.target.result;
        };
        reader.readAsDataURL(file);
    });
}
function handleViewerWheel(e){
    e.preventDefault();
    var scaleStep=0.1;
    viewerState.scale+=(e.deltaY<0?scaleStep:-scaleStep);
    viewerState.scale=Math.max(0.5,viewerState.scale);
    viewerImg.style.transform='translate('+viewerState.offsetX+'px, '+viewerState.offsetY+'px) scale('+viewerState.scale+')';
}
function handleViewerMouseDown(e){
    viewerState.isDragging=true;
    viewerState.startX=e.clientX-viewerState.offsetX;
    viewerState.startY=e.clientY-viewerState.offsetY;
    viewerContent.classList.add('dragging');
}
function handleViewerMouseMove(e){
    updateCrossAndCoord(e.clientX,e.clientY);
    if(!viewerState.isDragging)return;
    viewerState.offsetX=e.clientX-viewerState.startX;
    viewerState.offsetY=e.clientY-viewerState.startY;
    viewerImg.style.transform='translate('+viewerState.offsetX+'px, '+viewerState.offsetY+'px) scale('+viewerState.scale+')';
}
function handleViewerMouseUp(){
    viewerState.isDragging=false;
    viewerContent.classList.remove('dragging');
}
function getTouchDistance(touches){
    var dx=touches[0].clientX-touches[1].clientX;
    var dy=touches[0].clientY-touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
}
function handleViewerTouch(e){
    e.preventDefault();
    var touches=e.touches;
    if(touches.length===1){
        var touch=touches[0];
        updateCrossAndCoord(touch.clientX,touch.clientY);
        if(e.type==='touchstart'){
            viewerState.isDragging=true;
            viewerState.startX=touch.clientX-viewerState.offsetX;
            viewerState.startY=touch.clientY-viewerState.offsetY;
        }
        if(e.type==='touchmove'&&viewerState.isDragging){
            viewerState.offsetX=touch.clientX-viewerState.startX;
            viewerState.offsetY=touch.clientY-viewerState.startY;
            viewerImg.style.transform='translate('+viewerState.offsetX+'px, '+viewerState.offsetY+'px) scale('+viewerState.scale+')';
        }
    }
    if(touches.length===2){
        if(e.type==='touchstart'){viewerState.lastTouchDistance=getTouchDistance(touches);}
        if(e.type==='touchmove'){
            var distance=getTouchDistance(touches);
            var scale=distance/viewerState.lastTouchDistance;
            viewerState.scale*=scale;
            viewerState.scale=Math.max(0.5,viewerState.scale);
            viewerState.lastTouchDistance=distance;
            viewerImg.style.transform='translate('+viewerState.offsetX+'px, '+viewerState.offsetY+'px) scale('+viewerState.scale+')';
        }
    }
    if(e.type==='touchend'){viewerState.isDragging=false;}
}
addEvent(imageFile,'change',handleFileSelect);
addEvent(encryptBtn,'click',function(){batchProcessImages(false);});
addEvent(decryptBtn,'click',function(){batchProcessImages(true);});
addEvent(clearAllBtn,'click',clearAllImages);
addEvent(batchDownloadBtn,'click',batchDownloadImages);
addEvent(loadUrlBtn,'click',loadImageFromUrl);
addEvent(viewerCloseBtn,'click',closeImageViewer);
addEvent(imageViewer,'click',function(e){if(e.target===imageViewer)closeImageViewer();});
viewerContent=document.querySelector('.viewer-content');
pixelCoord=document.getElementById('pixelCoord');
horizontalLine=document.getElementById('horizontalLine');
verticalLine=document.getElementById('verticalLine');
addEvent(viewerContent,'wheel',handleViewerWheel);
addEvent(viewerContent,'mousedown',handleViewerMouseDown);
addEvent(document,'mousemove',handleViewerMouseMove);
addEvent(document,'mouseup',handleViewerMouseUp);
addEvent(viewerContent,'touchstart',handleViewerTouch);
addEvent(viewerContent, 'touchmove', handleViewerTouch);
addEvent(viewerContent, 'touchend', handleViewerTouch);
addEvent(window, 'popstate', function(e) {if (imageViewer.classList.contains('show')) closeImageViewer();});
addEvent(document, 'keydown', function(e) {if (e.keyCode === 27 && imageViewer.classList.contains('show')) closeImageViewer();});
</script>
